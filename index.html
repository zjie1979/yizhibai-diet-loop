<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>一只白</title>
  <meta name="theme-color" content="#3b424c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="一只白">
  <link rel="manifest" href="./manifest.webmanifest?v=20260722t1">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css?v=20260722t1">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">公开资料整理版</p>
        <h1>一只白</h1>
        <p class="app-note">首页只打卡；餐单库按系列选择；记录页看每份餐单完成次数。</p>
      </div>
      <button class="icon-button" id="resetTodayBtn" type="button" aria-label="重置今天">↺</button>
    </header>

    <section class="view is-active" id="viewToday" aria-labelledby="todayTitle">
      <div class="view-head compact">
        <div>
          <span class="label">首页</span>
          <h2 id="todayTitle">今日打卡</h2>
        </div>
        <span class="pill" id="todayDate"></span>
      </div>
      <section class="status-panel">
        <div>
          <span class="label">当前选择</span>
          <strong id="activePlanName">未选择餐单</strong>
          <p id="activePlanDesc">去餐单库选一份作为今天的打卡内容。</p>
        </div>
        <div class="progress-ring" aria-label="今日完成度">
          <span id="progressText">0%</span>
        </div>
      </section>
      <div class="step-list" id="stepList"></div>
      <div class="today-actions">
        <button class="primary-button" id="completeBtn" type="button" disabled>完成今天</button>
        <button class="secondary-button" type="button" data-tab="library">去选餐单</button>
      </div>
      <p class="auto-note" id="autoNote">不会自动进入下一份；明天重新选择。</p>
    </section>

    <section class="view" id="viewLibrary" aria-labelledby="libraryTitle">
      <div class="view-head">
        <div>
          <span class="label">第二页</span>
          <h2 id="libraryTitle">餐单库</h2>
          <p id="librarySub">先选系列，再看这个系列里的每天可选餐单。</p>
        </div>
      </div>
      <div id="libraryContent"></div>
    </section>

    <section class="view" id="viewRecords" aria-labelledby="recordsTitle">
      <div class="view-head">
        <div>
          <span class="label">第三页</span>
          <h2 id="recordsTitle">记录统计</h2>
          <p>查看最近完成记录，以及每个系列、每份餐单打卡了多少次。</p>
        </div>
      </div>
      <div id="recordsContent"></div>
    </section>
  </main>

  <nav class="bottom-tabs" aria-label="主导航">
    <button class="tab-button is-active" type="button" data-tab="today">今日</button>
    <button class="tab-button" type="button" data-tab="library">餐单库</button>
    <button class="tab-button" type="button" data-tab="records">记录</button>
  </nav>

  <script src="./app.js?v=20260722t1"></script>
</body>
</html>
